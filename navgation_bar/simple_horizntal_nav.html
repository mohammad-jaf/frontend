<!DOCTYPE html>
<html>

<head>
    <style>
        .menu {
            list-style-type: none;
            background-color: #eee;
            width: 100%;
            padding: 0;
            margin: 0;
            position: fixed;
            left: 0%;
            top: 0%;
        }
        
        .menuitem {
            display: inline-block;
            padding: 14px 0;
        }
        
        .menuitem a {
            color: black;
            font-size: 15px;
            padding: 14px;
        }
        
        .menuitem a:hover {
            background-color: #999;
        }
        
        .right {
            float: right;
        }
    </style>
</head>

<body>
    <ul class="menu">
        <li class="menuitem"><a herf="#home">Home</a></li>
        <li class="menuitem"><a herf="#about">About</a></li>
        <li class="menuitem"><a herf="#contact">Contact</a></li>
        <li class="menuitem"><a herf="#news">News</a></li>
        <li class="menuitem right"><a herf="#exit">Exit</a></li>
    </ul>
</body>

</html>
