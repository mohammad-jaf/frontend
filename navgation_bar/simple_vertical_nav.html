<!DOCTYPE html>
<html>

<head>
    <style>
        .menu {
            background-color: #ccc;
            list-style-type: none;
            padding: 0;
            margin: 0;
            margin-top: 2px;
            font-size: 20px;
            width: 20%;
            position: fixed;
            height: 100%;
            left: 0;
        }
        
        .menuitem a {
            display: block;
            padding: 14px 16px;
            font-size: 20px;
            text-decoration: none;
            color: #000;
            overflow: hidden;
        }
        
        .menuitem a.active {
            background-color: rgb(77, 77, 77);
            color: white;
            text-shadow: -1px 1px 8px white;
            transform: translate(10px, -4px);
            box-shadow: -5px 2px 8px grey;
        }
        
        .menuitem a:hover:not(.active) {
            background-color: #777;
            color: white;
            text-shadow: -1px 1px 8px white;
            transform: translate(10px, -4px);
            box-shadow: -5px 2px 8px grey;
        }
    </style>
</head>

<body>

    <ul class="menu">
        <li class="menuitem"><a href="#home">Home</a></li>
        <li class="menuitem"><a href="#news">News</a></li>
        <li class="menuitem"><a href="#contact">Contact</a></li>
        <li class="menuitem"><a href="#about">About</a></li>
        <li class="menuitem"><a href="#exit">Exit</a></li>
    </ul>

</body>

</html>
